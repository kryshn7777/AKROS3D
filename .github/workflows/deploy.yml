# Simple GitHub Pages deployment workflow for Vite
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Removed cache to avoid 'path not resolved' errors until structure is confirmed

      - name: Install & Build
        run: |
          if [ -d "web" ]; then
            cd web
            npm install
            npm run build
            echo "BUILD_PATH=web/dist" >> $GITHUB_ENV
          else
            npm install
            npm run build
            echo "BUILD_PATH=dist" >> $GITHUB_ENV
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_PATH }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
